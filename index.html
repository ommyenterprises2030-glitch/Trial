<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duka Langu POS</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#12132a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Duka POS">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#12132a;
    --panel:#1c1d3f;
    --panel-2:#242651;
    --purple:#8b7cf0;
    --gold:#f0a93a;
    --coral:#e85d4e;
    --green:#4ec98b;
    --text:#f5f2ea;
    --muted:#a6a4cc;
    --line:#33355e;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
  }
  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:16px 26px;
    border-bottom:1px solid var(--line);
    background:var(--panel);
    flex-wrap:wrap;
    gap:10px;
  }
  .brand{
    font-family:'Fraunces',serif;
    font-size:1.4rem;
    font-weight:700;
    margin:0;
  }
  .brand-sub{
    font-family:'JetBrains Mono',monospace;
    font-size:0.75rem;
    color:var(--gold);
    margin:0;
  }
  #clock{
    font-family:'JetBrains Mono',monospace;
    color:var(--muted);
    font-size:0.85rem;
  }

  .layout{
    display:flex;
    gap:0;
    align-items:flex-start;
    min-height:calc(100vh - 68px);
  }

  .catalog{
    flex:1;
    min-width:0;
    padding:22px 26px;
  }
  .search-row{
    display:flex;
    gap:10px;
    margin-bottom:18px;
  }
  input.search{
    flex:1;
    background:var(--panel);
    border:1px solid var(--line);
    color:var(--text);
    font-family:'Inter',sans-serif;
    font-size:0.95rem;
    padding:11px 14px;
    border-radius:8px;
  }
  input.search:focus-visible{outline:2px solid var(--purple);outline-offset:1px;}

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(170px, 1fr));
    gap:14px;
  }
  .card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    padding:16px 14px;
    cursor:pointer;
    text-align:left;
    color:var(--text);
    font-family:'Inter',sans-serif;
    transition:border-color .12s ease, transform .08s ease;
  }
  .card:hover{border-color:var(--purple);}
  .card:active{transform:scale(0.97);}
  .card:focus-visible{outline:2px solid var(--gold);outline-offset:2px;}
  .card-icon{
    margin-bottom:10px;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .card-icon svg{display:block;width:72px;height:72px;}
  .card-icon img{
    width:88px;
    height:88px;
    object-fit:cover;
    border-radius:10px;
    border:1px solid var(--line);
    display:block;
  }
  .card-name{font-size:0.92rem;font-weight:600;margin-bottom:4px;}
  .card-price{
    font-family:'JetBrains Mono',monospace;
    font-size:0.82rem;
    color:var(--gold);
  }

  .cart-panel{
    width:380px;
    flex-shrink:0;
    background:var(--panel);
    border-left:1px solid var(--line);
    display:flex;
    flex-direction:column;
    min-height:calc(100vh - 68px);
    position:sticky;
    top:0;
  }
  .cart-header{
    padding:18px 20px 12px;
    border-bottom:1px solid var(--line);
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .cart-header h2{
    font-family:'Fraunces',serif;
    font-size:1.15rem;
    margin:0;
  }
  .clear-btn{
    background:none;
    border:none;
    color:var(--muted);
    font-size:0.78rem;
    cursor:pointer;
    text-decoration:underline;
  }
  .clear-btn:hover{color:var(--coral);}

  .cart-items{
    flex:1;
    overflow-y:auto;
    padding:8px 14px;
  }
  .cart-items:empty::before{
    content:"Bado hakuna bidhaa. Bofya bidhaa upande wa kushoto.";
    color:var(--muted);
    font-size:0.85rem;
    font-style:italic;
    display:block;
    padding:24px 10px;
    text-align:center;
  }
  .cart-row{
    display:flex;
    align-items:center;
    gap:8px;
    padding:10px 6px;
    border-bottom:1px solid var(--line);
  }
  .cart-row-info{flex:1;min-width:0;}
  .cart-row-name{font-size:0.88rem;font-weight:600;}
  .cart-row-price{
    font-family:'JetBrains Mono',monospace;
    font-size:0.76rem;
    color:var(--muted);
  }
  .qty-ctrl{
    display:flex;
    align-items:center;
    gap:6px;
  }
  .qty-btn{
    width:24px;height:24px;
    border-radius:6px;
    border:1px solid var(--line);
    background:var(--panel-2);
    color:var(--text);
    cursor:pointer;
    font-size:0.9rem;
    line-height:1;
  }
  .qty-btn:hover{border-color:var(--purple);}
  .qty-val{
    font-family:'JetBrains Mono',monospace;
    font-size:0.85rem;
    min-width:18px;
    text-align:center;
  }
  .remove-btn{
    background:none;
    border:none;
    color:var(--coral);
    cursor:pointer;
    font-size:1rem;
    padding:0 2px;
  }
  .row-total{
    font-family:'JetBrains Mono',monospace;
    font-size:0.85rem;
    min-width:70px;
    text-align:right;
  }

  .summary{
    padding:14px 20px;
    border-top:1px solid var(--line);
  }
  .sum-row{
    display:flex;
    justify-content:space-between;
    font-family:'JetBrains Mono',monospace;
    font-size:0.88rem;
    color:var(--muted);
    margin-bottom:6px;
  }
  .sum-row.total{
    color:var(--text);
    font-size:1.15rem;
    font-weight:700;
    margin-top:8px;
  }

  .pay-area{padding:0 20px 20px;}
  .btn{
    width:100%;
    border:none;
    border-radius:8px;
    font-family:'Inter',sans-serif;
    font-weight:700;
    font-size:0.95rem;
    padding:13px 0;
    cursor:pointer;
    transition:background .15s ease;
  }
  .btn-primary{background:var(--coral);color:#12132a;}
  .btn-primary:hover:not(:disabled){background:var(--gold);}
  .btn-primary:disabled{opacity:0.4;cursor:default;}
  .btn-secondary{
    background:var(--panel-2);
    color:var(--text);
    border:1px solid var(--line);
    margin-top:8px;
  }
  .btn-secondary:hover{border-color:var(--purple);}

  .pay-input-row{
    display:flex;
    flex-direction:column;
    gap:8px;
    margin-bottom:10px;
  }
  .pay-input-row label{font-size:0.78rem;color:var(--muted);}
  input.pay-input{
    background:#0f1026;
    border:1px solid var(--line);
    color:var(--text);
    font-family:'JetBrains Mono',monospace;
    font-size:1rem;
    padding:10px 12px;
    border-radius:8px;
  }
  input.pay-input:focus-visible{outline:2px solid var(--purple);}
  .pay-msg{
    font-size:0.8rem;
    color:var(--coral);
    margin-top:-4px;
    margin-bottom:8px;
    min-height:14px;
  }

  .receipt{
    background:#0a0b1e;
    border:1px dashed var(--line);
    border-radius:8px;
    padding:14px;
    font-family:'JetBrains Mono',monospace;
    font-size:0.78rem;
    color:#c9f7c9;
    line-height:1.6;
  }
  .receipt hr{border:none;border-top:1px dashed var(--line);margin:8px 0;}
  .receipt .r-row{display:flex;justify-content:space-between;}

  @media (max-width:900px){
    .layout{flex-direction:column;}
    .cart-panel{width:100%;position:relative;min-height:auto;border-left:none;border-top:1px solid var(--line);}
  }

  @media print{
    header, .catalog, .cart-header, .clear-btn, .pay-area button, #payBtn, .qty-ctrl, .remove-btn { display:none !important; }
    body{background:#fff;color:#000;}
    .cart-panel{position:static;width:100%;border:none;}
    .receipt{color:#000;background:#fff;border:1px solid #000;}
  }
</style>
</head>
<body>

<header>
  <div>
    <p class="brand">Duka Langu</p>
    <p class="brand-sub">POS &middot; Mfumo wa Mauzo</p>
  </div>
  <div id="clock"></div>
</header>

<div class="layout">
  <section class="catalog">
    <div class="search-row">
      <input type="text" class="search" id="searchBox" placeholder="Tafuta bidhaa...">
    </div>
    <p id="dataSource" style="font-family:'JetBrains Mono',monospace;font-size:0.72rem;color:var(--muted);margin:-10px 0 14px;">Chanzo cha data: orodha ya ndani</p>
    <div class="grid" id="productGrid"></div>
  </section>

  <aside class="cart-panel">
    <div class="cart-header">
      <h2>Kikapu</h2>
      <button class="clear-btn" id="clearBtn">futa yote</button>
    </div>
    <div class="cart-items" id="cartItems"></div>

    <div class="summary">
      <div class="sum-row"><span>Jumla ndogo</span><span id="subtotalVal">TSh 0</span></div>
      <div class="sum-row"><span>VAT (18%)</span><span id="vatVal">TSh 0</span></div>
      <div class="sum-row total"><span>Jumla Kuu</span><span id="totalVal">TSh 0</span></div>
    </div>
    <p id="syncStatus" style="font-family:'JetBrains Mono',monospace;font-size:0.72rem;color:var(--muted);padding:0 20px;margin:-4px 0 10px;"></p>

    <div class="pay-area" id="payArea">
      <button class="btn btn-primary" id="payBtn" disabled>Kamilisha Malipo</button>
    </div>
  </aside>
</div>

<script src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js"></script>
<script>

  maziwa: `<svg width="40" height="40" viewBox="0 0 40 40"><path d="M13 8 L27 8 L27 12 L32 18 L32 34 Q32 36 30 36 H10 Q8 36 8 34 V18 L13 12 Z" fill="#f7f3ea" stroke="#33355e" stroke-width="1.5"/><path d="M13 8 L20 4 L27 8 Z" fill="#8b7cf0"/><line x1="8" y1="22" x2="32" y2="22" stroke="#33355e" stroke-width="1"/></svg>`,
  mkate: `<svg width="40" height="40" viewBox="0 0 40 40"><path d="M6 27 Q6 14 20 12 Q34 14 34 27 Q34 32 20 32 Q6 32 6 27 Z" fill="#e8b06a" stroke="#8a5a2b" stroke-width="1.5"/><path d="M14 15 L11 27 M20 13 L18 29 M26 15 L29 27" stroke="#8a5a2b" stroke-width="1.2" fill="none"/></svg>`,
  chai: `<svg width="40" height="40" viewBox="0 0 40 40"><path d="M10 16 H26 V26 Q26 32 18 32 Q10 32 10 26 Z" fill="#f7f3ea" stroke="#33355e" stroke-width="1.5"/><path d="M26 19 Q33 19 33 24 Q33 29 26 28" fill="none" stroke="#33355e" stroke-width="1.5"/><path d="M14 10 Q16 7 14 4" fill="none" stroke="#a6a4cc" stroke-width="1.3"/><path d="M20 10 Q22 7 20 4" fill="none" stroke="#a6a4cc" stroke-width="1.3"/></svg>`,
  sabuni: `<svg width="40" height="40" viewBox="0 0 40 40"><rect x="7" y="15" width="26" height="14" rx="6" fill="#bfe3d0" stroke="#33355e" stroke-width="1.5"/><circle cx="30" cy="10" r="2" fill="#bfe3d0" stroke="#33355e" stroke-width="1"/><circle cx="34" cy="14" r="1.3" fill="#bfe3d0" stroke="#33355e" stroke-width="1"/></svg>`,

function getIcon(p){
  if(p.image){
    return `<img src="${p.image}" alt="${p.name}" loading="lazy" onerror="this.onerror=null;this.parentElement.innerHTML=window.__iconFallback('${p.id}','${(p.icon||'').replace(/'/g,"")}')">`;
  }
  return ICONS[p.id] || `<span style="font-size:1.6rem">${p.icon || '🛒'}</span>`;
}

// Used as a fallback if an external image URL fails to load
window.__iconFallback = function(id, icon){
  return ICONS[id] || `<span style="font-size:1.6rem">${icon || '🛒'}</span>`;
};

async function loadProductsFromSheet(){
  if(!SHEET_API_URL || SHEET_API_URL.includes('PASTE_YOUR_WEB_APP_URL_HERE')){
    dataSourceEl.textContent = 'Chanzo cha data: orodha ya ndani (Sheet API haijawekwa)';
    return;
  }
  try{
    dataSourceEl.textContent = 'Inapakia bidhaa kutoka Google Sheet...';
    const res = await fetch(SHEET_API_URL + '?action=products');
    const data = await res.json();
    if(data.products && data.products.length){
      PRODUCTS = data.products.map(p => ({
        id: p.id, name: p.name, price: Number(p.price), icon: p.icon || '🛒', image: p.image || ''
      }));
      dataSourceEl.textContent = 'Chanzo cha data: Google Sheet (moja kwa moja)';
      renderProducts(searchBox.value);
    } else {
      dataSourceEl.textContent = 'Sheet haina bidhaa — inatumia orodha ya ndani';
    }
  }catch(err){
    dataSourceEl.textContent = 'Imeshindwa kufikia Sheet — inatumia orodha ya ndani';
  }
}

async function getPendingSales(){
  try{
    const res = await window.storage.get('pending-sales', false);
    return res && res.value ? JSON.parse(res.value) : [];
  }catch(e){
    return [];
  }
}

async function savePendingSales(list){
  try{
    await window.storage.set('pending-sales', JSON.stringify(list), false);
  }catch(e){
    console.warn('Imeshindwa kuhifadhi mauzo yanayosubiri', e);
  }
  updateSyncStatus(list.length);
}

function updateSyncStatus(pendingCount){
  if(!SHEET_API_URL || SHEET_API_URL.includes('PASTE_YOUR_WEB_APP_URL_HERE')){
    syncStatusEl.textContent = pendingCount > 0
      ? `${pendingCount} mauzo yamehifadhiwa ndani, yatatumwa mara Sheet API itakapowekwa`
      : '';
    return;
  }
  syncStatusEl.textContent = pendingCount > 0
    ? `Inasawazisha... ${pendingCount} mauzo yanasubiri kutumwa kwenye Sheet`
    : 'Mauzo yote yamehifadhiwa kwenye Google Sheet ✓';
}

async function postSaleToApi(payload){
  const res = await fetch(SHEET_API_URL, {
    method: 'POST',
    headers: {'Content-Type': 'text/plain;charset=utf-8'},
    body: JSON.stringify(payload)
  });
  const data = await res.json();
  if(!data.success) throw new Error('Sheet ilikataa ombi');
}

async function logSaleToSheet(items, subtotal, vat, total, cash, change){
  const payload = {
    action: 'sale',
    itemsText: items.map(i => `${i.name} x${i.qty}`).join(', '),
    subtotal, vat, total, cash, change,
    items: items.map(i => ({id: i.id, qty: i.qty})),
    timestamp: new Date().toISOString()
  };

  const configured = SHEET_API_URL && !SHEET_API_URL.includes('PASTE_YOUR_WEB_APP_URL_HERE');

  if(!configured){
    const pending = await getPendingSales();
    pending.push(payload);
    await savePendingSales(pending);
    return;
  }

  try{
    await postSaleToApi(payload);
    updateSyncStatus(0);
  }catch(err){
    const pending = await getPendingSales();
    pending.push(payload);
    await savePendingSales(pending);
  }
}

async function flushPendingSales(){
  const configured = SHEET_API_URL && !SHEET_API_URL.includes('PASTE_YOUR_WEB_APP_URL_HERE');
  if(!configured) return;

  const pending = await getPendingSales();
  if(!pending.length) return;

  const remaining = [];
  for(const sale of pending){
    try{
      await postSaleToApi(sale);
    }catch(err){
      remaining.push(sale);
    }
  }
  await savePendingSales(remaining);
}

let cart = {}; // id -> {name, price, qty}
let pyodide = null;
let pyReady = false;
let paid = false;

const productGrid = document.getElementById('productGrid');
const searchBox = document.getElementById('searchBox');
const cartItems = document.getElementById('cartItems');
const subtotalVal = document.getElementById('subtotalVal');
const vatVal = document.getElementById('vatVal');
const totalVal = document.getElementById('totalVal');
const payArea = document.getElementById('payArea');
const payBtn = document.getElementById('payBtn');
const clearBtn = document.getElementById('clearBtn');
const clockEl = document.getElementById('clock');
const dataSourceEl = document.getElementById('dataSource');
const syncStatusEl = document.getElementById('syncStatus');

function fmt(n){
  return 'TSh ' + Math.round(n).toLocaleString('en-US');
}

function renderProducts(filter=''){
  const f = filter.trim().toLowerCase();
  productGrid.innerHTML = '';
  PRODUCTS.filter(p => p.name.toLowerCase().includes(f)).forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'card';
    btn.innerHTML = `<div class="card-icon">${getIcon(p)}</div>
      <div class="card-name">${p.name}</div>
      <div class="card-price">${fmt(p.price)}</div>`;
    btn.addEventListener('click', () => addToCart(p));
    productGrid.appendChild(btn);
  });
}

function addToCart(p){
  if(paid) return;
  if(cart[p.id]) cart[p.id].qty += 1;
  else cart[p.id] = {id:p.id, name:p.name, price:p.price, qty:1};
  renderCart();
}

function changeQty(id, delta){
  if(!cart[id]) return;
  cart[id].qty += delta;
  if(cart[id].qty <= 0) delete cart[id];
  renderCart();
}

function removeItem(id){
  delete cart[id];
  renderCart();
}

clearBtn.addEventListener('click', () => {
  cart = {};
  paid = false;
  renderCart();
});

function renderCart(){
  cartItems.innerHTML = '';
  Object.entries(cart).forEach(([id, item]) => {
    const row = document.createElement('div');
    row.className = 'cart-row';
    row.innerHTML = `
      <div class="cart-row-info">
        <div class="cart-row-name">${item.name}</div>
        <div class="cart-row-price">${fmt(item.price)} kila moja</div>
      </div>
      <div class="qty-ctrl">
        <button class="qty-btn" data-act="dec">−</button>
        <span class="qty-val">${item.qty}</span>
        <button class="qty-btn" data-act="inc">+</button>
      </div>
      <div class="row-total">${fmt(item.price * item.qty)}</div>
      <button class="remove-btn" data-act="rm">✕</button>
    `;
    row.querySelector('[data-act="inc"]').addEventListener('click', () => changeQty(id, 1));
    row.querySelector('[data-act="dec"]').addEventListener('click', () => changeQty(id, -1));
    row.querySelector('[data-act="rm"]').addEventListener('click', () => removeItem(id));
    cartItems.appendChild(row);
  });
  updateTotals();
}

async function updateTotals(){
  const items = Object.values(cart).map(i => ({price:i.price, qty:i.qty}));
  if(!pyReady){
    subtotalVal.textContent = fmt(0);
    vatVal.textContent = fmt(0);
    totalVal.textContent = fmt(0);
    payBtn.disabled = true;
    return;
  }
  pyodide.globals.set('_items_json', JSON.stringify(items));
  const resultJson = pyodide.runPython(`
import json

_items = json.loads(_items_json)
_subtotal = sum(i["price"] * i["qty"] for i in _items)
_vat = _subtotal * 0.18
_total = _subtotal + _vat

json.dumps({"subtotal": _subtotal, "vat": _vat, "total": _total})
`);
  const totals = JSON.parse(resultJson);
  subtotalVal.textContent = fmt(totals.subtotal);
  vatVal.textContent = fmt(totals.vat);
  totalVal.textContent = fmt(totals.total);
  payBtn.disabled = Object.keys(cart).length === 0;
  if(!paid) renderPayButton(totals.total);
}

function renderPayButton(total){
  payArea.innerHTML = `<button class="btn btn-primary" id="payBtn" ${Object.keys(cart).length===0?'disabled':''}>Kamilisha Malipo</button>`;
  document.getElementById('payBtn').addEventListener('click', () => showPaymentForm(total));
}

function showPaymentForm(total){
  payArea.innerHTML = `
    <div class="pay-input-row">
      <label>Kiasi Alicholipa Mteja (TSh)</label>
      <input type="number" class="pay-input" id="cashInput" placeholder="mfano: 20000">
    </div>
    <div class="pay-msg" id="payMsg"></div>
    <button class="btn btn-primary" id="confirmPay">Thibitisha Malipo</button>
    <button class="btn btn-secondary" id="cancelPay">Ghairi</button>
  `;
  document.getElementById('cancelPay').addEventListener('click', () => renderPayButton(total));
  document.getElementById('confirmPay').addEventListener('click', async () => {
    const cash = parseFloat(document.getElementById('cashInput').value);
    const msg = document.getElementById('payMsg');
    if(isNaN(cash)){
      msg.textContent = 'Weka kiasi sahihi.';
      return;
    }
    if(cash < total){
      msg.textContent = 'Kiasi hakitoshi kulipa jumla.';
      return;
    }
    msg.textContent = '';
    const change = await computeChange(cash, total);
    completeSale(cash, total, change);
  });
}

async function computeChange(cash, total){
  pyodide.globals.set('_cash', cash);
  pyodide.globals.set('_total', total);
  return pyodide.runPython('_cash - _total');
}

function completeSale(cash, total, change){
  paid = true;
  const now = new Date();
  const soldItems = Object.values(cart);
  const itemsHtml = soldItems.map(i => `
    <div class="r-row"><span>${i.name} x${i.qty}</span><span>${fmt(i.price*i.qty)}</span></div>
  `).join('');
  payArea.innerHTML = `
    <div class="receipt">
      <div class="r-row"><strong>DUKA LANGU</strong></div>
      <div class="r-row"><span>${now.toLocaleDateString('sw-TZ')}</span><span>${now.toLocaleTimeString('sw-TZ')}</span></div>
      <hr>
      ${itemsHtml}
      <hr>
      <div class="r-row"><span>Jumla ndogo</span><span>${fmt(total/1.18)}</span></div>
      <div class="r-row"><span>VAT (18%)</span><span>${fmt(total - total/1.18)}</span></div>
      <div class="r-row"><strong>JUMLA</strong><strong>${fmt(total)}</strong></div>
      <hr>
      <div class="r-row"><span>Amelipa</span><span>${fmt(cash)}</span></div>
      <div class="r-row"><span>Salio</span><span>${fmt(change)}</span></div>
      <hr>
      <div class="r-row"><span>Asante kwa ununuzi!</span></div>
    </div>
    <button class="btn btn-secondary" id="printBtn">Chapisha Risiti</button>
    <button class="btn btn-secondary" id="newSaleBtn">Mauzo Mapya</button>
  `;
  document.getElementById('printBtn').addEventListener('click', () => window.print());
  document.getElementById('newSaleBtn').addEventListener('click', () => {
    cart = {};
    paid = false;
    renderCart();
  });

  const subtotal = total / 1.18;
  const vat = total - subtotal;
  logSaleToSheet(soldItems, subtotal, vat, total, cash, change);
}

searchBox.addEventListener('input', () => renderProducts(searchBox.value));

function tickClock(){
  clockEl.textContent = new Date().toLocaleString('sw-TZ');
}
setInterval(tickClock, 1000);
tickClock();

async function initPyodide(){
  pyodide = await loadPyodide();
  pyReady = true;
  updateTotals();
}

renderProducts();
renderCart();
loadProductsFromSheet();
flushPendingSales();
setInterval(flushPendingSales, 20000);
initPyodide();

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(err => {
      console.warn('Service worker haikuweza kusajiliwa', err);
    });
  });
}
</script>
